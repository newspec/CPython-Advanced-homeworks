function DefinitionSlide() {

            <p className="text-xs text-gray-700">Дескриптор — объект, управляющий доступом к атрибуту <strong>другого</strong> объекта. Должен быть в <code className="bg-indigo-100 px-1 rounded">__dict__</code> <strong>класса</strong>.</p>
          </Box>
          <Box title="Три метода протокола" color="blue">
            <table className="w-full text-xs">
              <thead><tr className="border-b border-blue-200">

              <tbody>
                {[["__get__(self, obj, type)","obj.attr"],["__set__(self, obj, value)","obj.attr = v"],["__delete__(self, obj)","del obj.attr"],["__set_name__(self, owner, name)","при создании класса"]].map(r=>(

          </Box>
        </div>

          <Code code={`class Descriptor:
    def __set_name__(self, owner, name):
        self.name = name

    def __get__(self, obj, objtype=None):
        if obj is None:
            return self    # через класс
        return 42          # через экземпляр

    def __set__(self, obj, value):
        print(f'SET {self.name} = {value!r}')

    def __delete__(self, obj):
        print(f'DELETE {self.name}')

class MyClass:
    x = Descriptor()   # в __dict__ класса!

obj = MyClass()
print(obj.x)     # → 42
obj.x = 99       # → SET x = 99
del obj.x        # → DELETE x
print(MyClass.x) # → <Descriptor object>`}/>
        </Box>
      </div>
    </div>
  );
}

    def __get__(self, obj, t=None): return 'DATA DESCRIPTOR'
    def __set__(self, obj, v): pass      # ← делает data-дескриптором

class NonDataDesc:
    def __get__(self, obj, t=None): return 'NON-DATA DESCRIPTOR'

class MyClass:
    d  = DataDesc()
    nd = NonDataDesc()

obj = MyClass()
obj.__dict__['d']  = 'INSTANCE'
obj.__dict__['nd'] = 'INSTANCE'

print(obj.d)    # → 'DATA DESCRIPTOR'   ← дескриптор победил!

class NonData:
    def __get__(self, o, t=None): return 'NONDATA'

class C:
    d   = Data()     # data descriptor

    cls = 'CLASS'    # обычный атрибут

    def bark(self):
        return f'{self.name}: woof!'

dog = Dog()
dog.name = 'Rex'

# Через класс → функция
print(type(Dog.bark))
# <class 'function'>

# Через экземпляр → bound method

# <class 'method'>

function PropertySlide() {
  return (
    <div className="flex flex-col h-full">
      <STitle>property — самый используемый дескриптор</STitle>
      <div className="grid grid-cols-2 gap-3 flex-1">
        <Box title="Использование" color="indigo">
          <Code code={`class Temperature:

    @property
    def celsius(self):
        return self._celsius

    @celsius.setter
    def celsius(self, value):
        if value < -273.15:
            raise ValueError('Ниже абс. нуля!')
        self._celsius = value

    @property
    def fahrenheit(self):      # read-only!
        return self._celsius * 9/5 + 32

t = Temperature()
t.celsius = 100
print(t.celsius)      # → 100
print(t.fahrenheit)   # → 212.0

# property — DATA DESCRIPTOR
p = Temperature.__dict__['celsius']
print(type(p))    # <class 'property'>
print(p.fget)     # <function celsius>`}/>
        </Box>
        <div className="flex flex-col gap-3">
          <Box title="Python-эквивалент property" color="gray">
            <Code code={`class property:
    def __init__(self, fget=None,
                       fset=None, fdel=None):
        self.fget = fget
        self.fset = fset
        self.fdel = fdel

    def __get__(self, obj, objtype=None):
        if obj is None:
            return self         # через класс
        return self.fget(obj)   # вызов геттера

    def __set__(self, obj, value):
        self.fset(obj, value)

    def __delete__(self, obj):
        self.fdel(obj)

    def setter(self, fset):
        return property(        # НОВЫЙ объект!
            self.fget, fset, self.fdel
        )`}/>
          </Box>
          <div className="bg-red-50 border border-red-200 rounded p-2 text-xs text-red-700">
            <strong>ВАЖНО:</strong> property — DATA DESCRIPTOR (есть __set__) → имеет приоритет над __dict__ экземпляра

        </div>
      </div>
    </div>
  );
}

    def __init__(self, x, y):
        self.x = x

class PointSlots:
    __slots__ = ('x', 'y')
    def __init__(self, x, y):
        self.x = x
        self.y = y

# Каждый слот → member_descriptor (DATA DESCRIPTOR)
x = PointSlots.__dict__['x']
print(type(x))            # <class 'member_descriptor'>
print(hasattr(x, '__get__'))  # True
print(hasattr(x, '__set__'))  # True

p = PointSlots(1, 2)

# Нет __dict__ у экземпляра
print(hasattr(p, '__dict__'))  # False

# Нельзя добавить произвольный атрибут
try:

function GenericGetAttrSlide() {
  return (
    <div className="flex flex-col h-full">
      <STitle>PyObject_GenericGetAttr — сердце протокола (Objects/object.c)</STitle>
      <div className="grid grid-cols-2 gap-3 flex-1">
        <Box title="C-реализация (аннотированная)" color="indigo">
          <Code code={`PyObject *
PyObject_GenericGetAttr(PyObject *obj,
                        PyObject *name) {
  PyTypeObject *tp = Py_TYPE(obj);

  /* ШАГ 1: Поиск в MRO класса */
  PyObject *descr = _PyType_Lookup(tp, name);

  descrgetfunc f = NULL;
  if (descr != NULL) {
    f = Py_TYPE(descr)->tp_descr_get;

    /* DATA DESCRIPTOR? */
    if (f && Py_TYPE(descr)->tp_descr_set) {
      return f(descr, obj, tp); /* приоритет 1 */
    }
  }

  /* ШАГ 2: instance __dict__ */
  PyObject *dict = *_PyObject_GetDictPtr(obj);
  if (dict) {
    PyObject *res = PyDict_GetItem(dict, name);
    if (res) return res;       /* приоритет 2 */
  }

  /* ШАГ 3: Non-data descriptor */
  if (f)
    return f(descr, obj, tp); /* приоритет 3 */

  /* ШАГ 4: Обычное значение класса */
  if (descr) return descr;   /* приоритет 4 */

  PyErr_Format(PyExc_AttributeError, ...);
  return NULL;
}`}/>
        </Box>
        <div className="flex flex-col gap-3">
          <Box title="Схема алгоритма" color="green">

function TypeLookupSlide() {
  return (
    <div className="flex flex-col h-full">
      <STitle>_PyType_Lookup и кэширование (Objects/typeobject.c)</STitle>
      <div className="grid grid-cols-2 gap-3 flex-1">
        <Box title="_PyType_Lookup — поиск по MRO" color="indigo">
          <Code code={`PyObject *
_PyType_Lookup(PyTypeObject *type,
               PyObject *name)
{
    /* Берём кортеж MRO */
    PyObject *mro = type->tp_mro;
    Py_ssize_t n = PyTuple_GET_SIZE(mro);

    for (Py_ssize_t i = 0; i < n; i++) {

        /* i-й класс из MRO */
        PyTypeObject *base =
          (PyTypeObject*)PyTuple_GET_ITEM(mro, i);

        /* O(1) поиск в __dict__ класса */
        PyObject *res = PyDict_GetItemWithError(
            base->tp_dict, name
        );

        if (res != NULL)
            return res;   /* Нашли! */
    }
    return NULL;  /* Нигде в MRO */
}`}/>
        </Box>
        <div className="flex flex-col gap-3">
          <Box title="Кэширование через version_tag" color="purple">
            <Code code={`/* Каждый тип имеет счётчик версии */
unsigned int tp_version_tag;

/* При изменении класса: */
static void
type_modified(PyTypeObject *type) {
    type->tp_version_tag =
        next_version_tag++;
    /* Рекурсивно для всех подклассов */
}`}/>
          </Box>
          <Box title="Python 3.11+: PEP 659" color="green">
            <p className="text-xs text-gray-700 mb-2"><strong>Specializing Adaptive Interpreter</strong> — inline cache прямо в байткоде:</p>

          </Box>
        </div>
      </div>
    </div>
  );
}

function PracticeSlide() {

    def __set_name__(self, owner, name):
        self.name = name
        self.private = f'_typed_{name}'

    def __init__(self, expected_type, validator=None):
        self.expected_type = expected_type
        self.validator = validator

    def __get__(self, obj, objtype=None):
        if obj is None: return self
        return getattr(obj, self.private, None)

    def __set__(self, obj, value):
        if not isinstance(value, self.expected_type):
            raise TypeError(
                f'{self.name}: ожидался '
                f'{self.expected_type.__name__}'
            )
        if self.validator and not self.validator(value):
            raise ValueError(f'{self.name}: неверное значение')
        setattr(obj, self.private, value)

class Person:
    name = Typed(str, lambda v: len(v) >= 2)
    age  = Typed(int, lambda v: 0 <= v <= 150)

p.name = 'Иван'   # OK

    { name:"lazy_property", desc:"Ленивое вычисление (кэш в __dict__)", code:`class lazy_property:
    """Non-data дескриптор: вычисляет один раз,
    затем кэширует в __dict__ экземпляра."""

    def __init__(self, func):
        self.func = func

    def __set_name__(self, owner, name):
        self.attrname = name

    def __get__(self, obj, objtype=None):
        if obj is None:
            return self
        # non-data → __dict__ имеет приоритет!
        # После первого вычисления __dict__
        # перехватывает все последующие обращения
        if self.attrname not in obj.__dict__:
            obj.__dict__[self.attrname] = self.func(obj)
        return obj.__dict__[self.attrname]

class Dataset:
    def __init__(self, data):
        self.data = data

    @lazy_property
    def sorted_data(self):   # вычисляется ОДИН раз
        return sorted(self.data)

d = Dataset([3, 1, 4, 1, 5])
print(d.sorted_data)  # вычисляет
print(d.sorted_data)  # из __dict__ (мгновенно)` },
    { name:"Observable", desc:"Паттерн Наблюдатель", code:`class Observable:
    """Уведомляет подписчиков при изменении."""

    def __init__(self, default=None):
        self.default = default
        self._callbacks = []

    def __set_name__(self, owner, name):
        self.name = name
        self.private = f'_obs_{name}'

    def __get__(self, obj, objtype=None):
        if obj is None: return self
        return getattr(obj, self.private, self.default)

    def __set__(self, obj, new_value):
        old = getattr(obj, self.private, self.default)
        object.__setattr__(obj, self.private, new_value)
        if old != new_value:
            for cb in self._callbacks:
                cb(obj, self.name, old, new_value)

    def subscribe(self, callback):
        self._callbacks.append(callback)

function App() {
  const [current, setCurrent] = useState(0);
  const slide = slides[current];
  const SlideComponent = slideComponents[slide.type];
  const total = slides.length;
  const go = (dir) => setCurrent(p => Math.max(0, Math.min(total-1, p+dir)));

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  return (
    <div style={{width:'100vw',height:'100vh',background:'white',display:'flex',flexDirection:'column',overflow:'hidden',margin:0,padding:0}}>

        <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
          <span style={{color:'white',fontSize:'12px',opacity:0.6}}>{current+1} / {total}</span>
          <div style={{display:'flex',gap:'5px'}}>
            {slides.map((_,i)=>(
              <button key={i} onClick={()=>setCurrent(i)}
                style={{width:'9px',height:'9px',borderRadius:'50%',border:'none',cursor:'pointer',
                        background: i===current ? 'white' : 'rgba(255,255,255,0.3)'}}/>

          </div>
        </div>
      </div>
      <div style={{flex:1,padding:'24px 32px',overflow:'auto'}}>
        <SlideComponent/>
      </div>
    </div>
  );
}
